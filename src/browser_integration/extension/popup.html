<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 260px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #f8fafc;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        .logo-icon svg {
            fill: #000;
            width: 18px;
            height: 18px;
        }

        .title {
            font-size: 14px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-box {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .label {
            color: #94a3b8;
        }

        .value {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #64748b;
        }

        .status-dot.connected {
            background-color: #10b981;
            box-shadow: 0 0 6px #10b981;
        }

        .status-dot.disconnected {
            background-color: #ef4444;
            box-shadow: 0 0 6px #ef4444;
        }

        .btn-open {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #0b0f19;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 242, 254, 0.15);
            transition: all 0.2s ease;
        }

        .btn-open:hover {
            box-shadow: 0 6px 14px rgba(0, 242, 254, 0.25);
            transform: translateY(-1px);
        }

        .btn-open:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
            </svg>
        </div>
        <h1 class="title">Virtual FIDO2</h1>
    </div>

    <div class="status-box">
        <div class="status-row">
            <span class="label">Serviço do Daemon</span>
            <span class="value" id="status-val">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Verificando...</span>
            </span>
        </div>
        <div class="status-row">
            <span class="label">Chaves Configuradas</span>
            <span class="value" id="keys-count">-</span>
        </div>
    </div>

    <button class="btn-open" id="open-btn">Abrir Painel</button>

    <script src="popup.js"></script>
</body>
</html>
